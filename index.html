<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LX Search - Liquid Glass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <style>
        :root {
            --base-bg: #09090b;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-bg-hover: rgba(255, 255, 255, 0.08);
            --glass-bg-active: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-highlight: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --accent: #818cf8;
            --accent-glow: rgba(129, 140, 248, 0.3);
            
            --blur-heavy: blur(48px) saturate(200%);
            --blur-medium: blur(24px) saturate(150%);
            
            --shadow-float: 0 32px 64px -16px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 40px var(--accent-glow);
            
            --radius-pill: 999px;
            --radius-lg: 32px;
            --radius-md: 20px;
            
            --spring: cubic-bezier(0.175, 0.885, 0.32, 1.05);
            --smooth: cubic-bezier(0.2, 0, 0, 1);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --base-bg: #f8fafc;
                --glass-bg: rgba(0, 0, 0, 0.03);
                --glass-bg-hover: rgba(0, 0, 0, 0.06);
                --glass-bg-active: rgba(0, 0, 0, 0.1);
                --glass-border: rgba(0, 0, 0, 0.05);
                --glass-border-highlight: rgba(0, 0, 0, 0.15);
                --text-main: #0f172a;
                --text-muted: rgba(0, 0, 0, 0.6);
                --accent: #4f46e5;
                --accent-glow: rgba(79, 70, 229, 0.2);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--base-bg);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: var(--base-bg);
        }

        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
            animation: float 20s infinite alternate ease-in-out;
        }

        .orb-1 { width: 600px; height: 600px; background: #4f46e5; top: -100px; left: -100px; animation-delay: 0s; }
        .orb-2 { width: 500px; height: 500px; background: #0ea5e9; bottom: -50px; right: -50px; animation-delay: -5s; }
        .orb-3 { width: 400px; height: 400px; background: #8b5cf6; top: 40%; left: 40%; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.2); }
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            z-index: 10;
        }

        .liquid-button {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 24px;
            background: var(--glass-bg);
            backdrop-filter: var(--blur-medium);
            -webkit-backdrop-filter: var(--blur-medium);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-pill);
            color: var(--text-main);
            font-family: inherit;
            font-size: 1.125rem;
            cursor: pointer;
            box-shadow: var(--shadow-float);
            transition: all 0.4s var(--smooth);
        }

        .liquid-button:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-border-highlight);
            transform: translateY(-4px) scale(1.02);
            box-shadow: var(--shadow-float), var(--shadow-glow);
        }

        .shortcut-badge {
            display: flex;
            gap: 4px;
            background: var(--glass-bg-active);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .search-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 10vh;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s var(--smooth);
        }

        .search-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .glass-panel {
            width: 90%;
            max-width: 760px;
            height: 80vh;
            max-height: 700px;
            background: var(--glass-bg);
            backdrop-filter: var(--blur-heavy);
            -webkit-backdrop-filter: var(--blur-heavy);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-float), inset 0 1px 1px rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            transform: translateY(40px) scale(0.95);
            opacity: 0;
            transition: all 0.5s var(--spring);
            overflow: hidden;
        }

        .search-overlay.active .glass-panel {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        .search-header {
            display: flex;
            align-items: center;
            padding: 24px;
            gap: 16px;
            border-bottom: 1px solid var(--glass-border);
            background: linear-gradient(to bottom, var(--glass-bg-hover), transparent);
        }

        .search-input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1.5rem;
            outline: none;
        }

        .search-input::placeholder { color: var(--text-muted); }

        .icon-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            width: 40px; height: 40px;
            border-radius: 50%;
            display: grid; place-items: center;
            cursor: pointer;
            transition: all 0.3s var(--smooth);
        }

        .icon-btn:hover {
            background: var(--glass-bg-hover);
            transform: scale(1.05);
        }

        .glass-filters {
            padding: 16px 24px;
            display: flex;
            gap: 12px;
            border-bottom: 1px solid var(--glass-border);
            overflow-x: auto;
            scrollbar-width: none;
        }
        
        .glass-filters::-webkit-scrollbar { display: none; }

        .glass-select {
            appearance: none;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: var(--radius-pill);
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            transition: all 0.3s var(--smooth);
        }

        .glass-select:focus, .glass-select:hover {
            background: var(--glass-bg-hover);
            border-color: var(--accent);
        }

        .glass-select option {
            background: var(--base-bg);
            color: var(--text-main);
        }

        .results-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
        }

        .results-container::-webkit-scrollbar { width: 6px; }
        .results-container::-webkit-scrollbar-thumb { background: var(--glass-border-highlight); border-radius: 10px; }

        .result-item {
            display: flex;
            align-items: center;
            padding: 16px;
            gap: 16px;
            background: var(--glass-bg);
            border: 1px solid transparent;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s var(--smooth);
        }

        .result-item:hover, .result-item.selected {
            background: var(--glass-bg-active);
            border-color: var(--glass-border-highlight);
            transform: translateX(4px);
        }

        .result-item.selected {
            border-left: 4px solid var(--accent);
        }

        .item-icon {
            width: 48px; height: 48px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--glass-bg-hover), var(--glass-bg));
            border: 1px solid var(--glass-border);
            display: grid; place-items: center;
            color: var(--accent);
        }

        .item-details { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        
        .item-name { font-size: 1.125rem; font-weight: 500; }
        
        .item-meta {
            font-size: 0.875rem;
            color: var(--text-muted);
            display: flex; gap: 8px; align-items: center;
        }

        .item-price {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
        }

        mark {
            background: var(--accent-glow);
            color: var(--accent);
            border-radius: 4px;
            padding: 0 2px;
            font-weight: 600;
        }

        .toast-container {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 1000;
        }

        .toast {
            background: var(--glass-bg);
            backdrop-filter: var(--blur-heavy);
            -webkit-backdrop-filter: var(--blur-heavy);
            border: 1px solid var(--glass-border-highlight);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: var(--radius-pill);
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow-float);
            animation: slideUp 0.4s var(--spring) forwards, fadeOut 0.4s var(--smooth) 2s forwards;
        }

        .status-bar {
            padding: 12px 24px;
            font-size: 0.875rem;
            color: var(--text-muted);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass-bg);
        }

        .keyboard-hints span {
            background: var(--glass-bg-hover);
            padding: 2px 6px;
            border-radius: 4px;
            margin: 0 4px;
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }

        @media (max-width: 768px) {
            .glass-panel { width: 100%; height: 100vh; max-height: 100vh; border-radius: 0; transform: translateY(100%); border: none; }
            .search-overlay { padding-top: 0; }
            .status-bar .keyboard-hints { display: none; }
        }
    </style>
</head>

                </div>
            </div>
        </div>
    </div>

حد"}, {name: "Zestril 20", unit: "10 Tab", price: 8.5, company: "شراء موحد"}, {name: "Zocor 10", unit: "7 Tab", price: 22.75, company: "شراء موحد"}, {name: "Zocor 20", unit: "14 Tab", price: 60.5, company: "شراء موحد"}, {name: "Zocor 40", unit: "14 Tab", price: 57, company: "شراء موحد"}
        ];

        const cm = {"شراء موحد": "Unified Purchase", "ايرادات هيئة": "Authority Revenue"};
        const db = rawData.map(i => {
            let n = i.name, t = "";
            ["قوي عاملة", "طلاب"].forEach(s => { if(n.includes(s)) { n = n.replace(s, "").trim(); t = s; } });
            return {
                raw: i, n, t, u: i.unit, p: i.price, s: cm[i.company] || i.company,
                str: `${n} ${t} ${i.unit} ${cm[i.company] || i.company}`.toLowerCase()
            };
        });

        const els = {
            ov: document.getElementById('overlay'),
            in: document.getElementById('input'),
            res: document.getElementById('results'),
            fU: document.getElementById('fUnit'),
            fS: document.getElementById('fSource'),
            btn: document.getElementById('triggerBtn'),
            clr: document.getElementById('clearBtn'),
            cnt: document.getElementById('resultCount'),
            tst: document.getElementById('toasts')
        };

        let selectedIdx = -1, currentResults = [];[...new Set(db.map(i=>i.u))].sort().forEach(u => els.fU.add(new Option(u,u)));
        [...new Set(db.map(i=>i.s))].sort().forEach(s => els.fS.add(new Option(s,s)));

        const highlight = (text, q) => {
            if(!q) return text;
            const terms = q.trim().split(/\s+/).filter(Boolean);
            let res = text;
            terms.forEach(term => {
                const regex = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                res = res.replace(regex, '<mark>$1</mark>');
            });
            return res;
        };

        const render = () => {
            const q = els.in.value.toLowerCase(), u = els.fU.value, s = els.fS.value;
            els.clr.style.display = q ? 'block' : 'none';
            
            let filtered = db.filter(i => (u === 'all' || i.u === u) && (s === 'all' || i.s === s));

            if(q) {
                const terms = q.trim().split(/\s+/);
                filtered = filtered.map(i => {
                    let score = 0;
                    terms.forEach(t => {
                        if(i.str.includes(t)) score += 10;
                        if(i.n.toLowerCase().startsWith(t)) score += 20;
                    });
                    return { ...i, score };
                }).filter(i => i.score > 0).sort((a,b) => b.score - a.score);
            }

            currentResults = filtered.slice(0, 50);
            selectedIdx = currentResults.length > 0 ? 0 : -1;
            
            els.cnt.textContent = `${filtered.length} found`;
            els.res.innerHTML = currentResults.length ? '' : 
                `<div style="text-align:center; padding: 40px; color: var(--text-muted);"><span class="material-symbols-rounded" style="font-size:48px; opacity:0.5; margin-bottom:16px;">search_off</span><h3>No matching items</h3></div>`;
            
            currentResults.forEach((i, idx) => {
                const div = document.createElement('div');
                div.className = `result-item ${idx === 0 ? 'selected' : ''}`;
                div.onclick = () => copyItem(i);
                div.innerHTML = `
                    <div class="item-icon"><span class="material-symbols-rounded">medication</span></div>
                    <div class="item-details">
                        <div class="item-name">${highlight(i.n, q)} ${i.t ? `<span style="color:var(--accent);font-size:0.8em;padding-left:4px">${i.t}</span>` : ''}</div>
                        <div class="item-meta"><span>${highlight(i.u, q)}</span> • <span>${highlight(i.s, q)}</span></div>
                    </div>
                    <div class="item-price">£${i.p.toFixed(2)}</div>
                `;
                els.res.appendChild(div);
            });
        };

        const toast = msg => {
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerHTML = `<span class="material-symbols-rounded" style="color:var(--accent)">check_circle</span> ${msg}`;
            els.tst.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        };

        const copyItem = i => {
            navigator.clipboard.writeText(`${i.n} ${i.t} | ${i.u} | £${i.p.toFixed(2)}`).then(() => {
                toast(`Copied ${i.n} to clipboard`);
                toggle(false);
            });
        };

        const updateSelection = () => {
            const items = els.res.children;
            if(!items.length) return;
            Array.from(items).forEach(el => el.classList.remove('selected'));
            if(selectedIdx >= 0) {
                const active = items[selectedIdx];
                active.classList.add('selected');
                active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            }
        };

        const toggle = force => {
            const state = typeof force === 'boolean' ? force : !els.ov.classList.contains('active');
            els.ov.classList.toggle('active', state);
            if(state) { els.in.focus(); render(); }
            else { els.in.blur(); els.in.value = ''; els.fU.value = 'all'; els.fS.value = 'all'; }
        };

        els.btn.onclick = () => toggle(true);
        els.clr.onclick = () => { els.in.value = ''; render(); els.in.focus(); };
        els.ov.onclick = e => { if(e.target === els.ov) toggle(false); };
        els.in.oninput = render;
        els.fU.onchange = render;
        els.fS.onchange = render;

        window.onkeydown = e => {
            if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); toggle(); }
            if(!els.ov.classList.contains('active')) return;
            
            if(e.key === 'Escape') toggle(false);
            if(e.key === 'ArrowDown') { e.preventDefault(); selectedIdx = Math.min(selectedIdx + 1, currentResults.length - 1); updateSelection(); }
            if(e.key === 'ArrowUp') { e.preventDefault(); selectedIdx = Math.max(selectedIdx - 1, 0); updateSelection(); }
            if(e.key === 'Enter' && selectedIdx >= 0) { e.preventDefault(); copyItem(currentResults[selectedIdx]); }
        };
    </script>
