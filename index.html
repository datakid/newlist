<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>LX Search p3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <style>
        :root {
            --sys-bg: #09090b;
            --sys-surface-low: rgba(24, 24, 28, 0.4);
            --sys-surface: rgba(28, 29, 34, 0.6);
            --sys-surface-high: rgba(255, 255, 255, 0.08);
            --sys-surface-highest: rgba(255, 255, 255, 0.15);
            --sys-outline: rgba(255, 255, 255, 0.1);
            --sys-outline-glow: rgba(168, 199, 250, 0.4);
            --sys-on-bg: #e2e2e9;
            --sys-on-surface-variant: #a0a0ab;
            --sys-primary: #a8c7fa;
            --sys-primary-container: rgba(168, 199, 250, 0.15);
            --sys-secondary: #ffb4a9;
            --sys-secondary-container: rgba(255, 180, 169, 0.15);
            --sys-success: #81c995;
            --blur-md: blur(24px) saturate(150%);
            --blur-lg: blur(60px) saturate(200%);
            --radius-full: 9999px;
            --radius-xl: 32px;
            --radius-lg: 24px;
            --radius-md: 16px;
            --shadow-float: 0 16px 40px -8px rgba(0, 0, 0, 0.6);
            --shadow-glow: 0 0 32px var(--sys-primary-container);
            --spring: cubic-bezier(0.2, 0, 0, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif; background-color: var(--sys-bg); color: var(--sys-on-bg);
            height: 100vh; overflow: hidden; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--sys-surface-highest); border-radius: var(--radius-full); border: 2px solid var(--sys-bg); }
        ::-webkit-scrollbar-thumb:hover { background: var(--sys-primary-container); }
        * { scrollbar-width: thin; scrollbar-color: var(--sys-surface-highest) transparent; }

        .ambient-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background: radial-gradient(circle at 15% 20%, rgba(40, 55, 100, 0.4) 0%, transparent 40%),
                        radial-gradient(circle at 85% 80%, rgba(80, 40, 80, 0.3) 0%, transparent 40%);
            filter: var(--blur-lg); animation: breathe 15s infinite alternate ease-in-out;
        }
        @keyframes breathe { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.1); opacity: 1; } }

        .header { padding: 24px; display: flex; align-items: center; justify-content: space-between; font-size: 1.25rem; font-weight: 600; letter-spacing: -0.5px; z-index: 10; flex-shrink: 0; }
        .header-controls { display: flex; gap: 12px; align-items: center; position: relative; }

        .icon-btn {
            background: var(--sys-surface-high); border: 1px solid var(--sys-outline); color: var(--sys-on-bg);
            width: 40px; height: 40px; border-radius: var(--radius-full); display: grid; place-items: center; cursor: pointer; transition: all 0.2s;
        }
        .icon-btn:hover { background: var(--sys-surface-highest); color: var(--sys-primary); transform: scale(1.05); }

        .dropdown-menu {
            position: absolute; top: 50px; right: 0; background: rgba(15, 16, 20, 0.95); backdrop-filter: var(--blur-lg);
            border: 1px solid var(--sys-outline); border-radius: var(--radius-md); padding: 8px;
            display: flex; flex-direction: column; gap: 4px; min-width: 160px; box-shadow: var(--shadow-float);
            opacity: 0; pointer-events: none; transform: translateY(-10px); transition: all 0.2s var(--spring); z-index: 100;
        }
        .dropdown-menu.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .dropdown-item {
            background: transparent; border: none; color: var(--sys-on-bg); font-family: inherit; font-size: 0.95rem;
            padding: 10px 16px; border-radius: 8px; text-align: left; cursor: pointer; transition: background 0.2s;
            display: flex; align-items: center; gap: 12px;
        }
        .dropdown-item:hover { background: var(--sys-surface-highest); color: var(--sys-primary); }
        .dropdown-item.active { background: var(--sys-primary-container); color: var(--sys-primary); font-weight: 600; }

        .main-container { flex: 1; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 800px; margin: 0 auto; padding: 0 24px; z-index: 10; min-height: 0; }

        .omnibar {
            width: 100%; background: var(--sys-surface); backdrop-filter: var(--blur-md); -webkit-backdrop-filter: var(--blur-md);
            border: 1px solid var(--sys-outline); border-radius: var(--radius-full); padding: 8px; display: flex; align-items: center; gap: 12px;
            box-shadow: var(--shadow-float); transition: all 0.3s var(--spring); margin-bottom: 16px; flex-shrink: 0;
        }
        .omnibar:focus-within { border-color: var(--sys-outline-glow); box-shadow: var(--shadow-float), var(--shadow-glow); transform: translateY(-2px); background: var(--sys-surface-high); }

        .omni-tabs { display: flex; background: rgba(0,0,0,0.4); border-radius: var(--radius-full); padding: 4px; gap: 4px; align-items: center; flex-shrink: 0;}
        .omni-tab {
            padding: 8px 16px; border-radius: var(--radius-full); border: none; background: transparent; color: var(--sys-on-surface-variant);
            font-family: inherit; font-size: 0.95rem; font-weight: 500; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: all 0.3s var(--spring); height: 36px;
        }
        .omni-tab.active { background: var(--sys-surface-highest); color: var(--sys-on-bg); }
        .omni-tab:hover:not(.active) { color: var(--sys-on-bg); }

        .omni-divider { width: 1px; height: 24px; background: var(--sys-outline); }
        .omni-input-area { flex: 1; display: flex; align-items: center; gap: 12px; padding-right: 16px; height: 36px; min-width: 0; }
        .omni-input { flex: 1; background: transparent; border: none; outline: none; color: var(--sys-on-bg); font-family: inherit; font-size: 1.15rem; min-width: 0; }
        .omni-input::placeholder { color: var(--sys-on-surface-variant); }
        .clear-btn { color: var(--sys-on-surface-variant); cursor: pointer; font-size: 20px; transition: color 0.2s; display: none; }
        .clear-btn:hover { color: var(--sys-primary); }
        
        .badge { background: var(--sys-primary); color: #000; font-size: 0.75rem; font-weight: 700; padding: 2px 8px; border-radius: var(--radius-full); transition: transform 0.2s var(--spring); }
        .badge.pop { transform: scale(1.2); }

        .view-section { width: 100%; flex: 1; overflow-y: auto; overflow-x: hidden; display: none; flex-direction: column; padding-bottom: 40px; min-height: 0; position: relative; }
        .view-section.active { display: flex; }

        .filters { display: flex; gap: 12px; margin-top: 8px; overflow-x: auto; padding-bottom: 8px; flex-shrink: 0; }
        .chip {
            background: var(--sys-surface); border: 1px solid var(--sys-outline); color: var(--sys-on-bg);
            padding: 8px 16px; border-radius: var(--radius-full); font-family: inherit; font-size: 0.9rem; cursor: pointer; outline: none; transition: background 0.2s; white-space: nowrap;
        }
        .chip:hover { background: var(--sys-surface-high); }
        .chip option { background: #18181c; color: var(--sys-on-bg); }

        .results-list { margin-top: 16px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 24px; }
        
        .card {
            background: var(--sys-surface); border: 1px solid var(--sys-outline); backdrop-filter: var(--blur-md); -webkit-backdrop-filter: var(--blur-md);
            border-radius: var(--radius-lg); padding: 12px 16px; display: flex; align-items: center; gap: 16px; transition: all 0.2s var(--spring); cursor: pointer;
        }
        .card:hover { border-color: var(--sys-outline-glow); transform: translateX(4px); background: var(--sys-surface-high); }
        
        .card-main-info { display: flex; align-items: center; gap: 16px; flex: 1; min-width: 0; }
        .card-icon { width: 44px; height: 44px; border-radius: var(--radius-md); background: var(--sys-primary-container); color: var(--sys-primary); display: grid; place-items: center; font-size: 22px; flex-shrink: 0; }
        .card-content { flex: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
        .card-title { font-size: 1.1rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 8px;}
        .card-subtitle { font-size: 0.85rem; color: var(--sys-on-surface-variant); display: flex; gap: 8px; align-items: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        
        .card-actions { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        
        input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        .quick-add-zone {
            display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.5); border-radius: var(--radius-full); padding: 4px 4px 4px 16px;
            border: 1px solid var(--sys-outline); transition: border 0.2s; cursor: default; width: 160px; justify-content: space-between;
        }
        .quick-add-zone:focus-within { border-color: var(--sys-primary); }
        .quick-input {
            flex: 1; background: transparent; border: none; outline: none; color: var(--sys-on-bg);
            text-align: left; font-family: inherit; font-size: 1.1rem; font-weight: 600; min-width: 0;
        }
        .quick-input::placeholder { color: var(--sys-on-surface-variant); font-weight: 400; font-size: 0.95rem;}
        .quick-unit { font-size: 0.85rem; color: var(--sys-on-surface-variant); font-weight: 500; flex-shrink: 0; }
        .quick-btn {
            background: var(--sys-surface-highest); color: var(--sys-on-bg); border: none; width: 36px; height: 36px; flex-shrink: 0;
            border-radius: var(--radius-full); display: grid; place-items: center; cursor: pointer; transition: all 0.2s;
        }
        .quick-btn:hover { background: var(--sys-primary); color: #000; transform: scale(1.05); }

        .copy-btn {
            background: transparent; border: 1px solid var(--sys-outline); color: var(--sys-on-surface-variant);
            width: 36px; height: 36px; border-radius: var(--radius-full); display: grid; place-items: center; cursor: pointer; transition: all 0.2s;
        }
        .copy-btn:hover { background: var(--sys-surface-highest); color: var(--sys-on-bg); border-color: var(--sys-on-bg);}

        .tag { background: var(--sys-primary-container); color: var(--sys-primary); padding: 2px 6px; border-radius: 6px; font-size: 0.75rem; }

        .saved-orders-bar { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 16px; border-bottom: 1px solid var(--sys-outline); margin-top: 8px; margin-bottom: 24px; flex-shrink: 0; }
        .order-chip {
            padding: 10px 20px; border-radius: var(--radius-md); border: 1px solid var(--sys-outline);
            background: var(--sys-surface-low); color: var(--sys-on-surface-variant); cursor: pointer; white-space: nowrap; font-size: 0.95rem; font-family: inherit; transition: all 0.2s;
        }
        .order-chip.active { background: var(--sys-surface-highest); color: var(--sys-primary); border-color: var(--sys-primary); }
        .order-chip:hover:not(.active) { background: var(--sys-surface-high); color: var(--sys-on-bg); }

        .dash-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; flex-wrap: wrap; gap: 16px; flex-shrink: 0; }
        .dash-title { font-size: 1.8rem; font-weight: 600; letter-spacing: -0.5px; display: flex; align-items: center; gap: 12px;}
        .dash-total { font-size: 1.6rem; font-weight: 700; color: var(--sys-primary); }

        .dash-grid { display: flex; flex-direction: column; gap: 12px; flex: 1; }
        .dash-item { background: var(--sys-surface-low); border: 1px solid var(--sys-outline); border-radius: var(--radius-lg); padding: 20px; display: flex; flex-direction: column; gap: 16px; flex-shrink: 0; }
        .dash-item-top { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--sys-outline); padding-bottom: 12px; }
        .dash-controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; align-items: center; }
        .control-group { display: flex; flex-direction: column; gap: 6px; }
        .control-label { font-size: 0.8rem; color: var(--sys-on-surface-variant); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;}
        
        .glass-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--sys-outline); color: var(--sys-on-bg); font-family: inherit; font-size: 1.25rem; font-weight: 500; padding: 12px; border-radius: var(--radius-md); outline: none; transition: all 0.2s; text-align: center;}
        .glass-input:focus { border-color: var(--sys-primary); background: rgba(0,0,0,0.5); }
        .calc-output { font-size: 1.5rem; font-weight: 600; color: var(--sys-on-bg); display: flex; align-items: center; height: 100%; }

        .dash-actions { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; 
            padding-top: 16px; padding-bottom: 16px; margin-top: auto;
            position: sticky; bottom: 0; background: var(--sys-bg); 
            box-shadow: 0 -20px 40px var(--sys-bg); z-index: 20; border-top: 1px solid var(--sys-outline);
        }
        .btn-action { padding: 14px; border-radius: var(--radius-full); border: none; font-family: inherit; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: transform 0.2s, filter 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .btn-primary { background: var(--sys-primary); color: #000; }
        .btn-secondary { background: var(--sys-surface-high); border: 1px solid var(--sys-outline); color: var(--sys-on-bg); }
        .btn-action:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .bottom-sheet { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(15, 16, 20, 0.95); border-top: 1px solid var(--sys-outline); border-radius: var(--radius-xl) var(--radius-xl) 0 0; padding: 32px 24px; transform: translateY(100%); transition: transform 0.5s var(--spring); z-index: 101; display: flex; flex-direction: column; gap: 24px; max-height: 90vh; }
        .modal-overlay.active .bottom-sheet { transform: translateY(0); }
        .handle { width: 40px; height: 4px; background: var(--sys-outline); border-radius: var(--radius-full); margin: -16px auto 16px; }
        .engine-links { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px;}
        .engine-btn { display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: var(--radius-md); background: var(--sys-surface-high); color: var(--sys-on-bg); text-decoration: none; font-size: 0.9rem; transition: background 0.2s; }
        .engine-btn:hover { background: var(--sys-surface-highest); color: var(--sys-primary); }

        .toast-container { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 1000; width: 90%; max-width: 400px; align-items: center;}
        .toast { background: var(--sys-surface); backdrop-filter: var(--blur-lg); border: 1px solid var(--sys-primary-container); color: var(--sys-on-bg); padding: 12px 24px; border-radius: var(--radius-full); display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow-float); animation: slideUp 0.4s var(--spring) forwards, fadeOut 0.4s var(--spring) 2.5s forwards; font-weight: 500; width: 100%; justify-content: center;}
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }
        mark { background: var(--sys-primary-container); color: var(--sys-primary); border-radius: 4px; padding: 0 2px; }

        @media (max-width: 768px) {
            .header { padding: 16px; }
            .main-container { padding: 0 16px; }
            .omnibar { flex-direction: column; border-radius: var(--radius-lg); padding: 12px; gap: 8px;}
            .omni-tabs { width: 100%; justify-content: space-between; }
            .omni-tab { flex: 1; justify-content: center; }
            .omni-divider { width: 100%; height: 1px; }
            .omni-input-area { width: 100%; padding-right: 0; }
            .card { flex-direction: column; align-items: stretch; gap: 12px;}
            .card-actions { width: 100%; justify-content: space-between; }
            .quick-add-zone { flex: 1; max-width: none; }
            .dash-controls { grid-template-columns: 1fr; gap: 12px;}
            .glass-input { text-align: left; }
            .dash-actions { position: relative; box-shadow: none; border-top: none; padding-bottom: 24px; }
        }
    </style>
</head>
<body>

    <div class="ambient-layer"></div>

    <header class="header">
        <div style="display: flex; align-items: center; gap: 12px;">
            <span class="material-symbols-rounded" style="color: var(--sys-primary); font-size: 32px;">stream</span>
            LX Search p3
        </div>
        <div class="header-controls">
            <button class="icon-btn" onclick="document.getElementById('fileUpload').click()" title="Import Order">
                <span class="material-symbols-rounded">upload</span>
            </button>
            <div style="position: relative;">
                <button class="icon-btn" id="engineToggleBtn" onclick="toggleEngineMenu()" title="Search Engine">
                    <span class="material-symbols-rounded">travel_explore</span>
                </button>
                <div class="dropdown-menu" id="engineMenu">
                    <button class="dropdown-item" onclick="setEngine('brave')" id="eng-brave"><span class="material-symbols-rounded">explore</span> Brave</button>
                    <button class="dropdown-item" onclick="setEngine('ddg')" id="eng-ddg"><span class="material-symbols-rounded">cruelty_free</span> DuckDuckGo</button>
                    <button class="dropdown-item" onclick="setEngine('startpage')" id="eng-startpage"><span class="material-symbols-rounded">lock</span> Startpage</button>
                    <button class="dropdown-item" onclick="setEngine('google')" id="eng-google"><span class="material-symbols-rounded">travel_explore</span> Google</button>
                    <button class="dropdown-item" onclick="setEngine('bing')" id="eng-bing"><span class="material-symbols-rounded">search</span> Bing</button>
                </div>
            </div>
            <input type="file" id="fileUpload" accept=".json" style="display:none">
        </div>
    </header>

    <main class="main-container">
        <div class="omnibar">
            <div class="omni-tabs">
                <button class="omni-tab active" id="tabSearch" onclick="switchView('search')">
                    <span class="material-symbols-rounded" style="font-size: 20px;">search</span> Search
                </button>
                <button class="omni-tab" id="tabCalc" onclick="switchView('calc')">
                    <span class="material-symbols-rounded" style="font-size: 20px;">edit_document</span> Dashboard
                    <span class="badge" id="cartBadge" style="display: none;">0</span>
                </button>
            </div>
            <div class="omni-divider"></div>
            <div class="omni-input-area">
                <span class="material-symbols-rounded" id="omniIcon" style="color: var(--sys-on-surface-variant);">data_usage</span>
                <input type="text" id="omniInput" class="omni-input" placeholder="Search or type / for commands..." autocomplete="off">
                <span class="material-symbols-rounded clear-btn" id="omniClear" onclick="clearInput()">close</span>
            </div>
        </div>

        <div class="view-section active" id="viewSearch">
            <div class="filters">
                <select id="fUnit" class="chip"><option value="all">Any Unit</option></select>
                <select id="fSource" class="chip"><option value="all">Any Source</option></select>
            </div>
            <div class="results-list" id="resultsList"></div>
        </div>

        <div class="view-section" id="viewCalc">
            <div class="saved-orders-bar" id="ordersBar"></div>

            <div class="dash-header">
                <h2 class="dash-title">
                    <span id="dashTitleText">Current Dashboard</span>
                    <span class="tag" style="font-size:0.8rem; background: var(--sys-surface-highest); color: var(--sys-on-surface-variant)" id="dashStatus">Unsaved</span>
                </h2>
                <div class="dash-total" id="dashTotal">0.00 EGP</div>
            </div>
            <div class="dash-grid" id="dashGrid"></div>
            <div class="dash-actions" id="dashActions" style="display: none;">
                <button class="btn-action btn-secondary" onclick="clearDashboard()"><span class="material-symbols-rounded">delete_sweep</span> Clear</button>
                <button class="btn-action btn-secondary" onclick="exportDashboardText()"><span class="material-symbols-rounded">content_copy</span> Copy</button>
                <button class="btn-action btn-secondary" onclick="downloadDashboard()"><span class="material-symbols-rounded">download</span> DL</button>
                <button class="btn-action btn-primary" onclick="saveAsOrder()"><span class="material-symbols-rounded">save</span> Submit Order</button>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="bottom-sheet">
            <div class="handle"></div>
            <div>
                <h2 id="sheetTitle" style="font-size: 2rem; margin-bottom: 8px;"></h2>
                <div class="card-subtitle" id="sheetMeta"></div>
                <div class="engine-links" id="sheetLinks"></div>
            </div>
            <div style="background: var(--sys-surface-low); border: 1px solid var(--sys-outline); border-radius: var(--radius-lg); padding: 24px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="color: var(--sys-on-surface-variant);">Base Quantity Mapping</span>
                    <span class="tag" id="sheetBase"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toasts"></div>

    <script>
        const escapeHTML = (s) => String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

            });

        };

            };
            if (document.startViewTransition) document.startViewTransition(apply); else apply();
        };

            else if(cmd === '/orders') switchView('calc');

        window.copyItemInfo = (id) => {

            if(preferredEngine === 'startpage') return `https://www.startpage.com/do/dsearch?query=${qStr}`;
            if(preferredEngine === 'google') return `https://www.google.com/search?q=${qStr}`;
            if(preferredEngine === 'bing') return `https://www.bing.com/search?q=${qStr}`;
            return `https://search.brave.com/search?q=${qStr}`;
        };
        const generateImageURL = (qStr) => {
            if(preferredEngine === 'ddg') return `https://duckduckgo.com/?q=${qStr}&ia=images&iax=images`;
            if(preferredEngine === 'startpage') return `https://www.startpage.com/do/dsearch?query=${qStr}&cat=images`;
            if(preferredEngine === 'google') return `https://www.google.com/search?tbm=isch&q=${qStr}`;
            if(preferredEngine === 'bing') return `https://www.bing.com/images/search?q=${qStr}`;
            return `https://search.brave.com/images?q=${qStr}`;
        };
        const getEngineName = () => {
            if(preferredEngine === 'ddg') return 'DuckDuckGo';
            if(preferredEngine === 'startpage') return 'Startpage';
            if(preferredEngine === 'google') return 'Google';
            if(preferredEngine === 'bing') return 'Bing';
            return 'Brave Search';
        };

        const openDetails = (id) => {
            const item = db.find(i => i.id === id);
            if (!item) return;
            document.getElementById('sheetTitle').innerHTML = `${escapeHTML(item.n)} ${item.t ? `<span class="tag" style="font-size:1rem; vertical-align:middle;">${escapeHTML(item.t)}</span>` : ''}`;
            document.getElementById('sheetMeta').innerHTML = `<span>${escapeHTML(item.u)}</span> • <span>${escapeHTML(item.s)}</span>`;
            const qStr = encodeURIComponent(item.n);
            
            document.getElementById('sheetLinks').innerHTML = `
                <a href="${generateSearchURL(qStr)}" target="_blank" class="engine-btn"><span class="material-symbols-rounded" style="font-size:18px">travel_explore</span> ${escapeHTML(getEngineName())}</a>
                <a href="${generateImageURL(qStr)}" target="_blank" class="engine-btn"><span class="material-symbols-rounded" style="font-size:18px">image</span> Images</a>
                <a href="https://www.drugs.com/search.php?searchterm=${qStr}" target="_blank" class="engine-btn"><span class="material-symbols-rounded" style="font-size:18px">medical_services</span> Drugs.com</a>
                <a href="https://www.perplexity.ai/search?q=${qStr}" target="_blank" class="engine-btn"><span class="material-symbols-rounded" style="font-size:18px">psychology</span> Perplexity</a>
            `;
            document.getElementById('sheetBase').textContent = `1 Pack = ${item.bQty} ${escapeHTML(item.bType)}`;
            els.modal.classList.add('active');
        };

        const renderDashboard = () => {
            const items = Array.from(dashboardMap.values()); const total = items.reduce((s, c) => s + c.cost, 0);
            els.dashTotal.textContent = `${total.toFixed(2)} EGP`;
            els.badge.style.display = items.length ? 'block' : 'none'; els.badge.textContent = items.length;
            els.dashActions.style.display = items.length ? 'grid' : 'none';

            els.ordersBar.style.display = savedOrders.length > 0 ? 'flex' : 'none';
            els.ordersBar.innerHTML = savedOrders.map((o, idx) => `<button class="order-chip ${idx === currentOrderIndex ? 'active' : ''}" onclick="loadOrder(${idx})">${escapeHTML(o.name)}</button>`).join('') + `<button class="order-chip" onclick="clearDashboard()">+ New</button>`;
            els.dashTitleText.textContent = currentOrderIndex >= 0 ? savedOrders[currentOrderIndex].name : "Current Dashboard";
            els.dashStatus.textContent = currentOrderIndex >= 0 ? "Saved Order" : "Active / Unsaved";
            els.dashStatus.style.background = currentOrderIndex >= 0 ? "var(--sys-primary-container)" : "var(--sys-surface-highest)";

            els.dashGrid.innerHTML = items.map(c => `
                <div class="dash-item">
                    <div class="dash-item-top">
                        <div><div class="card-title">${escapeHTML(c.item.n)} ${c.item.t ? `<span class="tag">${escapeHTML(c.item.t)}</span>` : ''}</div><div class="card-subtitle">Base: ${c.item.bQty} ${escapeHTML(c.item.bType)} / Pack</div></div>
                        <button class="icon-btn" onclick="removeDashboardItem('${escapeHTML(c.item.id)}')" style="background:transparent; border:none; color:var(--sys-secondary)"><span class="material-symbols-rounded">delete</span></button>
                    </div>
                    <div class="dash-controls">
                        <div class="control-group"><span class="control-label">Req. ${escapeHTML(c.item.bType)}</span><input type="number" class="glass-input" value="${escapeHTML(c.req)}" min="0" oninput="updateDashItem('${escapeHTML(c.item.id)}', this.value)"></div>
                        <div class="control-group"><span class="control-label">Packs</span><div class="calc-output" id="out-packs-${escapeHTML(c.item.id)}">${c.packs}</div></div>
                        <div class="control-group"><span class="control-label">Cost (EGP)</span><div class="calc-output" id="out-cost-${escapeHTML(c.item.id)}" style="color: var(--sys-primary)">${c.cost.toFixed(2)}</div></div>
                    </div>
                </div>
            `).join('') || '<div style="text-align:center; padding:60px 20px; color:var(--sys-on-surface-variant);"><span class="material-symbols-rounded" style="font-size:48px; opacity:0.5">assignment</span><p style="margin-top:16px">Dashboard is empty. Search and quickly add items.</p></div>';
        };

        window.updateDashItem = (id, val) => {
            const entry = dashboardMap.get(id); if(!entry) return;
            const req = parseFloat(val) || 0; const packs = Math.round(req / entry.item.bQty); const cost = packs * entry.item.p;
            entry.req = req; entry.packs = packs; entry.cost = cost; dashboardMap.set(id, entry); currentOrderIndex = -1; saveState();
        };

        window.removeDashboardItem = (id) => { dashboardMap.delete(id); currentOrderIndex = -1; saveState(); };
        window.clearDashboard = () => { dashboardMap.clear(); currentOrderIndex = -1; saveState(); };

        window.saveAsOrder = () => {
            if(dashboardMap.size === 0) return;
            if(savedOrders.length >= 10) { alert("Maximum 10 saved orders allowed. Please clear some."); return; }
            const orderName = `Order ${new Date().toLocaleDateString()} ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
            savedOrders.push({ id: Date.now().toString(), name: orderName, total: els.dashTotal.textContent, items: Array.from(dashboardMap.entries()) });
            currentOrderIndex = savedOrders.length - 1; saveState(); showToast("Order submitted & saved", "bookmark_added");
        };

        window.loadOrder = (idx) => { const order = savedOrders[idx]; if(!order) return; dashboardMap = new Map(order.items); currentOrderIndex = idx; saveState(); showToast(`Loaded ${order.name}`, "restore"); };

        window.exportDashboardText = () => {
            const items = Array.from(dashboardMap.values()); if(!items.length) return;
            let txt = `${els.dashTitleText.textContent}:\n\n`; items.forEach(c => { txt += `- ${c.item.n}: Req ${c.req} ${c.item.bType} -> ${c.packs} Packs = ${c.cost.toFixed(2)} EGP\n`; });
            txt += `\nTotal: ${els.dashTotal.textContent}`; navigator.clipboard.writeText(txt).then(() => showToast("Copied to clipboard", "content_copy"));
        };

        window.downloadDashboard = () => {
            if(dashboardMap.size === 0) return;
            const blob = new Blob([JSON.stringify({ title: els.dashTitleText.textContent, items: Array.from(dashboardMap.entries()) }, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = `LX_Order_${Date.now()}.json`;
            a.click(); URL.revokeObjectURL(url); showToast("Download started", "download_done");
        };

        els.fileUp.addEventListener('change', (e) => {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try { const data = JSON.parse(ev.target.result); if(data.items) { dashboardMap = new Map(data.items); currentOrderIndex = -1; saveState(); showToast("Order loaded from file", "file_download_done"); } } catch(err) { alert("Invalid file format"); }
            }; reader.readAsText(file); els.fileUp.value = '';
        });

        els.in.addEventListener('input', () => { 
            if(activeView === 'calc' && !els.in.value.startsWith('/')) switchView('search'); 
            if(activeView === 'search') renderSearch(); 
        });

        els.fU.addEventListener('change', renderSearch); els.fS.addEventListener('change', renderSearch);
        els.modal.addEventListener('click', e => { if(e.target === els.modal) els.modal.classList.remove('active'); });
        
        document.addEventListener('keydown', e => { 
            if ((e.ctrlKey || e.metaKey) && e.code === 'KeyK') { 
                e.preventDefault(); 
                els.in.focus(); 
            } 
            else if (e.key === '/' || e.key === 'ظ') {
                if (document.activeElement !== els.in) {
                    e.preventDefault();
                    els.in.focus();
                }
            }
            if(e.key === 'Escape') els.modal.classList.remove('active'); 
        });

        loadState(); renderSearch(); renderDashboard();
    </script>
</body>
</html>
