const getIconForUnit = (unitStr) => {
const u = unitStr.toLowerCase();
if (u.includes('tab') || u.includes('cap')) return 'pill';
if (u.includes('pen') || u.includes('cartridge')) return 'syringe';
if (u.includes('vial')) return 'vaccines';
if (u.includes('bottle')) return 'medication';
if (u.includes('spray') || u.includes('inhaler')) return 'air';
return 'medical_services';
};

const db = rawData.map(i => {
let n = i.name, t = "";
["قوي عاملة", "طلاب"].forEach(s => { if(n.includes(s)){ n = n.replace(s, "").trim(); t = s; } });
const nLower = n.toLowerCase();
const isInsulin = insulins.some(kw => nLower.includes(kw));
let bQty = 1, bType = i.unit;
if(isInsulin) { bQty = nLower.includes('toujeo') ? 450 : 300; bType = 'IU'; }
else { let match = i.unit.match(/(\d+)/); if(match) { bQty = parseInt(match[1]); bType = i.unit.replace(/\d+/g, '').trim() || 'Unit'; } }
const sName = cm[i.company] || i.company;
const searchStr = `${n} ${t} ${i.unit} ${sName}`.toLowerCase();
const icon = getIconForUnit(i.unit);
return { id: Math.random().toString(36).substr(2, 9), n, nLower, t, u: i.unit, p: i.price, s: sName, bQty, bType, isInsulin, searchStr, icon, isDynamic: !!i.dp };
});

});
return res;
};

const appendNextChunk = () => {
if(renderedCount >= currentResults.length) return;
const sentinel = document.getElementById('loadSentinel');
if(sentinel) sentinel.remove();
const isPack = globalAddMode === 'pack';
const qTokens = els.in.value.toLowerCase().trim().split(/\s+/).filter(Boolean);
const chunk = currentResults.slice(renderedCount, renderedCount + CHUNK_SIZE);
const html = chunk.map(i => cardTemplate(i, qTokens, isPack)).join('');
els.res.insertAdjacentHTML('beforeend', html);
renderedCount += chunk.length;
updateResultsMeta();
if(renderedCount < currentResults.length) {
els.res.insertAdjacentHTML('beforeend', '<div class="load-sentinel" id="loadSentinel"></div>');
const newSentinel = document.getElementById('loadSentinel');
disconnectObserver();
resultsObserver = new IntersectionObserver((entries) => {
if(entries[0].isIntersecting) appendNextChunk();
}, { root: els.res, rootMargin: '600px' });
resultsObserver.observe(newSentinel);
}
};

const loadAllRemaining = () => {
disconnectObserver();
while(renderedCount < currentResults.length) {
const isPack = globalAddMode === 'pack';
const qTokens = els.in.value.toLowerCase().trim().split(/\s+/).filter(Boolean);
const sentinel = document.getElementById('loadSentinel');
if(sentinel) sentinel.remove();
const chunk = currentResults.slice(renderedCount, renderedCount + CHUNK_SIZE);
els.res.insertAdjacentHTML('beforeend', chunk.map(i => cardTemplate(i, qTokens, isPack)).join(''));
renderedCount += chunk.length;
}
updateResultsMeta();
};

const updateResultsMeta = () => {
if(!currentResults.length) { els.meta.textContent = ''; return; }
els.meta.textContent = renderedCount >= currentResults.length
? `${currentResults.length} result${currentResults.length === 1 ? '' : 's'}`
: `Showing ${renderedCount} of ${currentResults.length} — scroll for more`;
};

const focusCardById = (id) => {
setTimeout(() => {
let guard = 0;
while(!document.getElementById(`quick-in-${id}`) && renderedCount < currentResults.length && guard < 30) { appendNextChunk(); guard++; }
const qtyInput = document.getElementById(`quick-in-${id}`);
if(qtyInput) { qtyInput.focus(); qtyInput.closest('.card').scrollIntoView({ block: 'center', behavior: 'smooth' }); }
}, 30);
};

const renderSearch = () => {
closeQuickLinks();
const rawQ = els.in.value;
const qStr = rawQ.toLowerCase().trim();
els.icon.textContent = activeView === 'calc' ? 'calculate' : 'data_usage';
els.clear.style.display = rawQ.length > 0 ? 'flex' : 'none';

disconnectObserver();

const qTokens = qStr.split(/\s+/).filter(Boolean);
const u = els.fU.value, s = els.fS.value;

els.fU.classList.toggle('active-filter', u !== 'all'); document.getElementById('fUnitX').style.display = u !== 'all' ? 'grid' : 'none';
els.fS.classList.toggle('active-filter', s !== 'all'); document.getElementById('fSourceX').style.display = s !== 'all' ? 'grid' : 'none';

let filtered = [];
for(let i=0; i<db.length; i++) {
const item = db[i];
if(u !== 'all' && item.u !== u) continue;
if(s !== 'all' && item.s !== s) continue;

let score = 0;
if(qTokens.length > 0) {
let matchedAll = true;
for(let j=0; j<qTokens.length; j++) {
const tk = qTokens[j];
if(!item.searchStr.includes(tk)) { matchedAll = false; break; }
if(item.nLower.startsWith(tk)) score += 20; else score += 10;
}
if(!matchedAll) continue;
}
filtered.push({...item, score});
}
if(qTokens.length > 0) filtered.sort((a,b) => b.score - a.score);

currentResults = filtered;
renderedCount = 0;
els.res.innerHTML = filtered.length ? '' : '<div style="text-align:center; padding:40px; color:var(--sys-on-surface-variant);">No matches found</div>';
if(filtered.length) appendNextChunk();
else updateResultsMeta();

focusedCardIndex = -1;
};

window.copyItemInfo = (id) => {
const item = db.find(i => i.id === id);
if (!item) return;
const pStr = item.isDynamic ? '50% Supply Price' : `${item.p.toFixed(2)} EGP`;
navigator.clipboard.writeText(`${item.n} ${item.t} | ${item.u} | ${pStr}`).then(() => showToast(`Copied ${item.n}`, "content_copy"));
};

window.toggleQuickMode = (e, id, bType) => {

const btn = document.getElementById(`quick-toggle-${id}`);
if(!btn) return;
const currentMode = btn.getAttribute('data-mode');

const commitToCalc = (id, req, sp = 0) => {
const item = db.find(i => i.id === id);
if (!item) return null;
const packs = Math.round(req / item.bQty);
const cost = item.isDynamic ? packs * (sp * 0.5) : packs * item.p;
dashboardMap.set(id, { item, req, packs, cost, supplyPrice: sp });
syncCurrentOrder();
els.badge.classList.add('pop'); els.badge.style.display = 'block'; els.badge.textContent = dashboardMap.size;
setTimeout(() => els.badge.classList.remove('pop'), 200);
if(activeView === 'calc') renderDashboard();
return { item, packs, cost };
};

window.inlineAdd = (id, btnEl) => {

const rawReq = parseFloat(input.value);
if(isNaN(rawReq) || rawReq <= 0 || rawReq > 999999) return;
const item = db.find(i => i.id === id);
if (!item) return;

let sp = 0;
if(item.isDynamic) {
const spInput = document.getElementById(`quick-sp-${id}`);
sp = parseFloat(spInput.value);
if(isNaN(sp) || sp < 0) {
showToast("Please enter Supply Price", "warning");
spInput.focus();
return;
}
}

const toggleBtn = document.getElementById(`quick-toggle-${id}`);
const mode = toggleBtn ? toggleBtn.getAttribute('data-mode') : globalAddMode;
const req = mode === 'pack' ? rawReq * item.bQty : rawReq;
const result = commitToCalc(id, req, sp);
if(!result) return;

input.value = ''; input.blur();
if(item.isDynamic) document.getElementById(`quick-sp-${id}`).value = '';

if(btnEl) {

globalAddMode = mode; localStorage.setItem('lx_add_mode', mode); updateDockUI();
if(activeView === 'search') renderSearch();
showToast(`Global unit set to ${mode === 'pack' ? 'Packages' : 'Base Unit'}`, 'straighten');
refreshCmdkKeepFocus();
};
const applyEngine = (engine) => { setEngine(engine); refreshCmdkKeepFocus(); };
const applyDefaultSize = (n) => {
defaultQuickQty = n; localStorage.setItem('lx_default_qty', n);
showToast(`Default quick-add size set to ${n}`, 'bolt');
refreshCmdkKeepFocus();
};

const baseCommands = () => [
{ icon: 'calculate', title: 'Open Calculator', sub: 'View current calculation',
actions: [{ icon: 'calculate', label: 'Open Calculator', shortcut: 'Enter', run: () => { closeCmdk(); switchView('calc'); } }] },
{ icon: 'delete_sweep', title: 'Clear Calculator', sub: 'Empty current calculation',
actions: [{ icon: 'delete_sweep', label: 'Clear Calculator', shortcut: 'Enter', run: () => { closeCmdk(); clearDashboard(); switchView('calc'); showToast('Calculator cleared'); } }] },
{ icon: 'search', title: 'Go to Search', sub: 'Back to medicine search',
actions: [{ icon: 'search', label: 'Go to Search', shortcut: 'Enter', run: () => { closeCmdk(); switchView('search'); } }] },
{ icon: 'content_copy', title: 'Export Calculation', sub: 'Copy summary to clipboard',
actions: [{ icon: 'content_copy', label: 'Export Calculation', shortcut: 'Enter', run: () => { closeCmdk(); exportDashboardText(); switchView('calc'); } }] },
{ icon: 'bookmark', title: 'Saved Orders', sub: 'Open calculator orders',
actions: [{ icon: 'bookmark', label: 'Open Saved Orders', shortcut: 'Enter', run: () => { closeCmdk(); switchView('calc'); } }] },
{ icon: 'straighten', title: 'Global Unit', sub: `Currently: ${globalAddMode === 'pack' ? 'Packages' : 'Base Unit'}`,
actions: [
{ icon: 'straighten', label: 'Base Unit', active: globalAddMode === 'unit', run: () => applyGlobalUnit('unit') },
{ icon: 'inventory_2', label: 'Packages', active: globalAddMode === 'pack', run: () => applyGlobalUnit('pack') }
] },
{ icon: 'travel_explore', title: 'Search Engine', sub: `Currently: ${getEngineName()}`,
actions: enginePresets.map(e => ({ icon: engineMeta[e].icon, label: engineMeta[e].label, active: preferredEngine === e, run: () => applyEngine(e) })) },
{ icon: 'bolt', title: 'Default Quick Size', sub: `Currently: ${defaultQuickQty}`,
actions: sizePresets.map(n => ({ icon: 'bolt', label: `${n}`, active: defaultQuickQty === n, run: () => applyDefaultSize(n) })) }
];

const buildMedicineActions = (m) => {
const actions = [];
actions.push({
icon: 'bolt', label: 'Add to Calculator', shortcut: 'Enter',
run: () => {
const qtyEl = document.getElementById('paneQty');
const spEl = document.getElementById('paneSp');
const qty = qtyEl ? parseFloat(qtyEl.value) : (defaultQuickQty || 1);
if(isNaN(qty) || qty <= 0) { showToast('Enter a valid quantity', 'warning'); if(qtyEl) qtyEl.focus(); return; }
let sp = 0;
if(m.isDynamic) {
sp = spEl ? parseFloat(spEl.value) : NaN;
if(isNaN(sp) || sp < 0) { showToast('Enter a supply price', 'warning'); if(spEl) spEl.focus(); return; }
}
const req = globalAddMode === 'pack' ? qty * m.bQty : qty;
const result = commitToCalc(m.id, req, sp);
if(!result) return;
showToast(`Added ${result.packs} pack${result.packs === 1 ? '' : 's'} of ${m.n}`, 'bolt');
cmdkEls.input.value = ''; cmdkLastQuery = ''; renderCmdk(''); cmdkEls.input.focus();
}
});
actions.push({ icon: 'open_in_new', label: 'Open Full Details', shortcut: '⌘1', run: () => { closeCmdkSilently(); openDetails(m.id); } });
const qStr = encodeURIComponent(m.n);
actions.push({ icon: engineMeta[preferredEngine].icon, label: getEngineName(), shortcut: '⌘2', run: () => window.open(generateSearchURL(qStr), '_blank', 'noopener,noreferrer') });
actions.push({ icon: 'image', label: 'View Images', shortcut: '⌘3', run: () => window.open(generateImageURL(qStr), '_blank', 'noopener,noreferrer') });
actions.push({ icon: 'medical_services', label: 'Drugs.com', shortcut: '⌘4', run: () => window.open(`https://www.drugs.com/search.php?searchterm=${qStr}`, '_blank', 'noopener,noreferrer') });
actions.push({ icon: 'psychology', label: 'Perplexity', shortcut: '⌘5', run: () => window.open(`https://www.perplexity.ai/search?q=${qStr}`, '_blank', 'noopener,noreferrer') });
return actions;
};

let cmdkLastQuery = '';

window.openCmdk = () => {
cmdkLastFocused = document.activeElement;
closeQuickLinks();
cmdkEls.overlay.classList.add('active');
cmdkEls.input.value = cmdkLastQuery;
renderCmdk(cmdkLastQuery);
setTimeout(() => { cmdkEls.input.focus(); cmdkEls.input.select(); }, 50);
};

window.closeCmdk = () => {
cmdkEls.overlay.classList.remove('active');
cmdkEls.input.blur();
if(cmdkLastFocused && document.contains(cmdkLastFocused)) cmdkLastFocused.focus();
};

const closeCmdkSilently = () => { cmdkEls.overlay.classList.remove('active'); cmdkEls.input.blur(); };

const renderCmdk = (q) => {
const raw = q.trim();
cmdkParsedQty = null;
cmdkPaneFocused = false;
cmdkPaneIndex = 0;

let searchStr = raw;
const qtyMatch = raw.match(/^(.*?)\s*[x×]\s*(\d+(?:\.\d+)?)$/i);
if(qtyMatch && qtyMatch[1].trim()) { searchStr = qtyMatch[1].trim(); cmdkParsedQty = parseFloat(qtyMatch[2]); }

const qStr = searchStr.toLowerCase();
cmdkItems = [];
baseCommands().filter(c => !qStr || c.title.toLowerCase().includes(qStr)).forEach(c => cmdkItems.push({ type: 'command', ...c }));
if(qStr) {
const qTokens = qStr.split(/\s+/).filter(Boolean);
db.filter(item => qTokens.every(tk => item.searchStr.includes(tk))).slice(0, 8).forEach(m => {
cmdkItems.push({
type: 'medicine', id: m.id, icon: m.icon, title: m.n + (m.t ? ' ' + m.t : ''),
sub: m.isDynamic ? '50% Supply Price' : `${m.p.toFixed(2)} EGP`,
dynamic: m.isDynamic, actions: buildMedicineActions(m)
});
});
}
cmdkActiveIndex = cmdkItems.length ? 0 : -1;
paintCmdk();
};

const refreshCmdkKeepFocus = () => {
const wasPane = cmdkPaneFocused, wasIdx = cmdkPaneIndex, wasActive = cmdkActiveIndex;
renderCmdk(cmdkEls.input.value);
cmdkActiveIndex = Math.min(wasActive, cmdkItems.length - 1);
cmdkPaneFocused = wasPane; cmdkPaneIndex = wasIdx;
paintCmdk();
};

const paintCmdk = () => {
if(!cmdkItems.length) {
cmdkEls.list.innerHTML = '<div class="cmdk-empty">No matches found</div>';
cmdkEls.pane.innerHTML = '<div class="cmdk-pane-empty">Select an item to see actions</div>';
return;
}
let html = '';
const shown = {};
const typeLabel = { command: 'Commands', medicine: 'Medicines' };
cmdkItems.forEach((item, i) => {
if(!shown[item.type]) { html += `<div class="cmdk-group-label">${escapeHTML(typeLabel[item.type] || '')}</div>`; shown[item.type] = true; }
html += `<div class="cmdk-item${i === cmdkActiveIndex ? ' active' : ''}" role="option" aria-selected="${i === cmdkActiveIndex}" onmouseenter="cmdkHover(${i})" onclick="cmdkClickItem(${i})">
<span class="material-symbols-rounded">${escapeHTML(item.icon)}</span>
<span class="cmdk-item-title">${escapeHTML(item.title)}</span>
<span class="cmdk-item-sub">${escapeHTML(item.sub || '')}</span>
 ${item.actions && item.actions.length > 1 ? '<span class="material-symbols-rounded cmdk-item-chevron">chevron_right</span>' : ''}
</div>`;
});
cmdkEls.list.innerHTML = html;
paintPane();
};

const paintPane = () => {
const item = cmdkItems[cmdkActiveIndex];
if(!item) { cmdkEls.pane.innerHTML = '<div class="cmdk-pane-empty">Select an item to see actions</div>'; return; }
let extraFields = '';
let navIdx = 0;
if(item.type === 'medicine') {
const med = db.find(d => d.id === item.id);
const qtyVal = cmdkParsedQty || defaultQuickQty || 1;
extraFields = `
<div class="cmdk-pane-fields">
<div class="cmdk-pane-field"><label>Quantity (${escapeHTML(med.bType)})</label><input type="number" id="paneQty" class="cmdk-pane-input pane-nav-item" value="${escapeHTML(String(qtyVal))}" min="0" oninput="checkMax(this); updatePanePreview(${escapeAttr(item.id)})" onkeydown="paneKeydown(event, ${navIdx++})"></div>
 ${med.isDynamic ? `<div class="cmdk-pane-field"><label>Supply Price</label><input type="number" id="paneSp" class="cmdk-pane-input pane-nav-item" placeholder="EGP" min="0" oninput="checkMax(this); updatePanePreview(${escapeAttr(item.id)})" onkeydown="paneKeydown(event, ${navIdx++})"></div>` : ''}
</div>
<div class="cmdk-pane-preview" id="panePreview"></div>
`;
}
cmdkEls.pane.innerHTML = `
<div class="cmdk-pane-header">
<span class="material-symbols-rounded">${escapeHTML(item.icon)}</span>
<div><div class="cmdk-pane-title">${escapeHTML(item.title)}</div><div class="cmdk-pane-sub">${escapeHTML(item.sub || '')}</div></div>
</div>
 ${extraFields}
<div class="cmdk-pane-actions">
 ${item.actions.map((a, i) => `
<div class="cmdk-pane-action pane-nav-item${i === 0 ? ' default-action' : ''}" tabindex="0" role="button" aria-label="${escapeHTML(a.label)}" onkeydown="paneKeydown(event, ${navIdx + i})" onclick="cmdkPaneFocused = true; cmdkItems[cmdkActiveIndex].actions[${i}].run();">
<span class="material-symbols-rounded">${escapeHTML(a.icon)}</span>
<span class="cmdk-pane-action-label">${escapeHTML(a.label)}</span>
 ${a.active ? '<span class="material-symbols-rounded cmdk-pane-check">check</span>' : ''}
 ${a.shortcut ? `<kbd>${escapeHTML(a.shortcut)}</kbd>` : ''}
</div>
`).join('')}
</div>
`;
if(item.type === 'medicine') updatePanePreview(item.id);
if(cmdkPaneFocused) {
const navEls = Array.from(cmdkEls.pane.querySelectorAll('.pane-nav-item'));
const target = navEls[Math.min(cmdkPaneIndex, navEls.length - 1)];
if(target) target.focus();
}
};

window.updatePanePreview = (id) => {
const med = db.find(d => d.id === id);
const preview = document.getElementById('panePreview');
if(!med || !preview) return;
const qtyEl = document.getElementById('paneQty');
const qty = qtyEl ? parseFloat(qtyEl.value) : NaN;
if(isNaN(qty) || qty <= 0) { preview.textContent = 'Enter a quantity to preview cost'; return; }
const req = globalAddMode === 'pack' ? qty * med.bQty : qty;
const packs = Math.round(req / med.bQty);
if(med.isDynamic) {
const spEl = document.getElementById('paneSp');
const sp = spEl ? parseFloat(spEl.value) : NaN;
if(isNaN(sp) || sp < 0) { preview.textContent = `${packs} pack${packs === 1 ? '' : 's'} (${req} ${med.bType}) — enter supply price`; return; }
preview.textContent = `${packs} pack${packs === 1 ? '' : 's'} (${req} ${med.bType}) → ${(packs * sp * 0.5).toFixed(2)} EGP`;
} else {
preview.textContent = `${packs} pack${packs === 1 ? '' : 's'} (${req} ${med.bType}) → ${(packs * med.p).toFixed(2)} EGP`;
}
};

window.cmdkHover = (i) => { cmdkActiveIndex = i; cmdkPaneFocused = false; cmdkPaneIndex = 0; paintCmdk(); };
window.cmdkClickItem = (i) => { cmdkActiveIndex = i; cmdkPaneFocused = false; cmdkPaneIndex = 0; const item = cmdkItems[i]; if(item && item.actions && item.actions[0]) item.actions[0].run(); else paintCmdk(); };

const codeToLabel = (code) => {
if(code.startsWith('Key')) return code.slice(3);
if(code.startsWith('Digit')) return code.slice(5);
if(code === 'Space') return 'Space';
return code;
};
const comboFromEvent = (e) => {
const parts = [];
if(e.ctrlKey || e.metaKey) parts.push('⌘');
if(e.altKey) parts.push('⌥');
if(e.shiftKey) parts.push('⇧');
parts.push(codeToLabel(e.code));
return parts.join('');
};

const exitPaneToList = () => {
cmdkPaneFocused = false;
cmdkPaneIndex = 0;
paintCmdk();
cmdkEls.input.focus();
};

const runShortcutForActiveItem = (e) => {
const combo = comboFromEvent(e);
const item = cmdkItems[cmdkActiveIndex];
const match = item && item.actions && item.actions.find(a => a.shortcut === combo);
if(match) { e.preventDefault(); match.run(); return true; }
return false;
};

window.paneKeydown = (e, idx) => {
if(e.key === 'ArrowDown') {
e.preventDefault();
const navEls = Array.from(cmdkEls.pane.querySelectorAll('.pane-nav-item'));
cmdkPaneIndex = Math.min(idx + 1, navEls.length - 1);
const next = navEls[cmdkPaneIndex];
if(next) next.focus();
return;
}
if(e.key === 'ArrowUp') {
e.preventDefault();
const navEls = Array.from(cmdkEls.pane.querySelectorAll('.pane-nav-item'));
cmdkPaneIndex = Math.max(idx - 1, 0);
const prev = navEls[cmdkPaneIndex];
if(prev) prev.focus();
return;
}
if(e.key === 'ArrowLeft') { e.preventDefault(); exitPaneToList(); return; }
if(e.key === 'Escape') { e.preventDefault(); exitPaneToList(); return; }
if(e.key === 'Enter') {
const target = e.currentTarget;
if(target.tagName === 'INPUT') {
e.preventDefault();
const item = cmdkItems[cmdkActiveIndex];
if(item && item.actions && item.actions[0]) item.actions[0].run();
return;
}
if(target.getAttribute('role') === 'button') { e.preventDefault(); target.click(); return; }
return;
}
runShortcutForActiveItem(e);
};

cmdkEls.input.addEventListener('input', () => { cmdkLastQuery = cmdkEls.input.value; renderCmdk(cmdkLastQuery); });
cmdkEls.overlay.addEventListener('click', e => { if(e.target === cmdkEls.overlay) closeCmdk(); });
cmdkEls.input.addEventListener('keydown', e => {
if(e.key === 'ArrowDown') {
e.preventDefault();
if(cmdkItems.length) { cmdkActiveIndex = Math.min(cmdkActiveIndex + 1, cmdkItems.length - 1); cmdkPaneFocused = false; cmdkPaneIndex = 0; paintCmdk(); }
return;
}
if(e.key === 'ArrowUp') {
e.preventDefault();
if(cmdkItems.length) { cmdkActiveIndex = Math.max(cmdkActiveIndex - 1, 0); cmdkPaneFocused = false; cmdkPaneIndex = 0; paintCmdk(); }
return;
}
if(e.key === 'ArrowRight') {
const item = cmdkItems[cmdkActiveIndex];
if(item && item.actions && item.actions.length) { e.preventDefault(); cmdkPaneFocused = true; cmdkPaneIndex = 0; paintCmdk(); }
return;
}
if(e.key === 'Enter') {
e.preventDefault();
const item = cmdkItems[cmdkActiveIndex];
if(item && item.actions && item.actions.length) item.actions[0].run();
return;
}
runShortcutForActiveItem(e);
});

window.cardKeydown = (e, id) => {
if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openDetails(id); return; }
if(e.key === 'ArrowDown') { e.preventDefault(); moveFocus(1); }
else if(e.key === 'ArrowUp') { e.preventDefault(); moveFocus(-1); }
};

document.addEventListener('keydown', e => {
if ((e.ctrlKey || e.metaKey) && e.code === 'KeyK') {
e.preventDefault();
if(cmdkEls.overlay.classList.contains('active')) closeCmdk(); else openCmdk();
return;
}
if(cmdkEls.overlay.classList.contains('active')) {
if(e.key === 'Escape') { e.preventDefault(); if(cmdkPaneFocused) { cmdkPaneFocused = false; paintCmdk(); } else closeCmdk(); }
return;
}
if (e.code === 'Slash' && document.activeElement !== els.in && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA' && document.activeElement.tagName !== 'SELECT') {
e.preventDefault(); switchView('search'); els.in.focus(); return;
}
if(e.key === 'Escape') {
if(quickLinksOpenId) { closeQuickLinks(); return; }
if(els.modal.classList.contains('active')) { closeModal(); return; }
if(document.activeElement === els.in) { els.in.blur(); return; }
return;
}
if(activeView === 'search' && document.activeElement === els.in) {
const cards = els.res.querySelectorAll('.card');
if(!cards.length) return;
if(e.key === 'ArrowDown') { e.preventDefault(); focusedCardIndex = 0; moveFocus(0); }
else if(e.key === 'ArrowUp') { e.preventDefault(); focusedCardIndex = cards.length - 1; moveFocus(0); }
else if(e.key === 'Enter') { if(focusedCardIndex >= 0 && cards[focusedCardIndex]) { e.preventDefault(); cards[focusedCardIndex].click(); } }
}
if(activeView === 'search' && e.key === 'End' && document.activeElement !== els.in && !document.activeElement.matches('input')) {
e.preventDefault(); loadAllRemaining();
const cards = Array.from(els.res.querySelectorAll('.card'));
focusedCardIndex = cards.length - 1; updateFocus(cards);
}
if(activeView === 'search' && e.key === 'Home' && document.activeElement !== els.in && !document.activeElement.matches('input')) {
e.preventDefault();
const cards = Array.from(els.res.querySelectorAll('.card'));
focusedCardIndex = 0; updateFocus(cards);
}
});

loadState(); renderSearch(); renderDashboard();
</script>
</body>
</html>
